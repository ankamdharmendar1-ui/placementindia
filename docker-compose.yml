version: "3.9"

services:
  # MongoDB Database
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  # Node.js Main Backend
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/quetext-in
      - PORT=5000
    depends_on:
      - mongodb

  # Python AI Service (DeepSearch)
  ai-service:
    build: ./ai-service
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
    depends_on:
      - backend

volumes:
  mongo_data:
