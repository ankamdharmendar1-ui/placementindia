<!DOCTYPE html>
<html lang="en" data-beasties-container>
<head>
  <meta charset="utf-8" />
  <title>Quetext Tools Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Collection of free utilities from Quetext – plagiarism checker, YouTube subscribe link generator, and more." />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body {font-family:'Inter',system-ui,sans-serif; background:#f5f5f5; display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0;}
    .container {background:#fff; max-width:800px; width:90%; padding:2rem; border-radius:12px; box-shadow:0 4px 12px rgba(0,0,0,.1);}
    h1 {font-size:2rem; color:#333; margin-bottom:1rem; text-align:center;}
    ul {list-style:none; padding:0;}
    li {margin:0.75rem 0;}
    a.tool-link {display:block; padding:0.75rem 1rem; background:#007ac6; color:#fff; text-decoration:none; border-radius:6px; transition:background .3s;}
    a.tool-link:hover {background:#005b94;}
  </style>
</head>
<body>
  <div class="container">
    <h1>Quetext Tools Hub</h1>
    <p>Select a tool to open:</p>
    <ul id="tools-list">
      <!-- Tool links will be injected here -->
    </ul>
  </div>
  <script>
    // Dynamically generate list of sub‑folders (tools)
    // In a static site we cannot read the filesystem, so we hard‑code known tools.
    const tools = [
      { name: 'Free YouTube Subscribe Link Generator', path: 'youtube-subscribe-generator/' }
      // Add new tools here following the same structure.
    ];
    const listEl = document.getElementById('tools-list');
    tools.forEach(t => {
      const li = document.createElement('li');
      const a = document.createElement('a');
      a.href = t.path;
      a.textContent = t.name;
      a.className = 'tool-link';
      li.appendChild(a);
      listEl.appendChild(li);
    });
  </script>
</body>
</html>
